<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TITSA – Asistente de Guaguas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #1a7a3c; --verde-bg: rgba(26,122,60,0.08);
      --amarillo: #f5c800; --amarillo-texto: #6b4f00;
      --fondo: #f0f0ec; --blanco: #fff; --texto: #1a1a1a;
      --texto-suave: #777; --borde: rgba(0,0,0,0.09);
    }
    body { background: var(--fondo); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 0.75rem; }
    .app { width: 100%; max-width: 460px; display: flex; flex-direction: column; height: 100vh; max-height: 820px; border-radius: 22px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.11); background: var(--blanco); }
    .header { background: var(--verde); padding: 13px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-icon { width: 36px; height: 36px; background: var(--amarillo); border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-icon svg { width: 20px; height: 20px; }
    .header-info h1 { font-size: 14px; font-weight: 600; color: #fff; }
    .header-info p { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 1px; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 10px; color: rgba(255,255,255,0.65); }
    .status-dot { width: 6px; height: 6px; background: #5dde8a; border-radius: 50%; animation: pulse 2.5s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(93,222,138,0.5); } 50% { box-shadow: 0 0 0 4px rgba(93,222,138,0); } }
    .ctx-banner { background: var(--amarillo); padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .ctx-texto { font-size: 12px; font-weight: 600; color: var(--amarillo-texto); }
    .ctx-reset { font-size: 11px; color: var(--verde); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: 'DM Sans', sans-serif; }
    .chat { flex: 1; overflow-y: auto; background: var(--fondo); padding: 14px 11px; display: flex; flex-direction: column; gap: 11px; scroll-behavior: smooth; }
    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 93%; animation: fadeUp 0.18s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .bot .bubble { background: var(--blanco); border: 1px solid var(--borde); color: var(--texto); border-radius: 3px 16px 16px 16px; padding: 10px 13px; font-size: 13px; line-height: 1.6; }
    .user .bubble { background: var(--verde); color: #fff; border-radius: 16px 3px 16px 16px; padding: 10px 13px; font-size: 13px; }
    .msg-time { font-size: 10px; color: var(--texto-suave); padding: 0 4px; }
    .bubble table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 12px; }
    .bubble th { background: var(--verde); color: #fff; padding: 6px 8px; text-align: center; font-weight: 600; font-size: 11px; }
    .bubble td { padding: 5px 8px; border-bottom: 1px solid var(--borde); text-align: center; }
    .bubble tr:nth-child(even) td { background: #f7f7f4; }
    .linea-badge { display: inline-block; background: var(--verde); color: #fff; font-family: 'DM Mono', monospace; font-size: 11px; padding: 1px 7px; border-radius: 5px; margin-right: 4px; }
    .parada-id { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--verde); background: var(--verde-bg); padding: 1px 5px; border-radius: 4px; margin-right: 4px; }
    .chips { display: flex; flex-wrap: wrap; gap: 5px; padding: 7px 11px 4px; background: var(--fondo); flex-shrink: 0; }
    .chip { font-size: 11.5px; font-family: 'DM Sans', sans-serif; padding: 5px 11px; border-radius: 18px; border: 1px solid var(--borde); background: var(--blanco); color: var(--texto); cursor: pointer; transition: all 0.13s; }
    .chip:hover { background: var(--verde); color: #fff; border-color: var(--verde); }
    .input-area { background: var(--blanco); padding: 9px 11px; display: flex; gap: 7px; align-items: center; border-top: 1px solid var(--borde); flex-shrink: 0; }
    .chat-input { flex: 1; border: 1px solid var(--borde); border-radius: 20px; padding: 9px 15px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--fondo); color: var(--texto); outline: none; transition: border-color 0.13s; }
    .chat-input:focus { border-color: var(--verde); }
    .chat-input:disabled { opacity: 0.5; }
    .send-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--verde); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity 0.13s; }
    .send-btn:hover { opacity: 0.82; }
    .send-btn:disabled { opacity: 0.38; cursor: default; }
    .send-btn svg { width: 14px; height: 14px; }
    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 13px; background: var(--blanco); border: 1px solid var(--borde); border-radius: 3px 16px 16px 16px; width: fit-content; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }
    #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 999; color: #fff; font-size: 14px; flex-direction: column; gap: 10px; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <span>Cargando datos de TITSA...</span>
</div>

<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a7a3c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10h18M3 10l3-6h12l3 6M3 10v8a1 1 0 001 1h1m15-9v8a1 1 0 01-1 1h-1M7 19h10M7 19a2 2 0 01-2-2v-1h14v1a2 2 0 01-2 2"/>
        <circle cx="7.5" cy="19.5" r="1" fill="#1a7a3c" stroke="none"/>
        <circle cx="16.5" cy="19.5" r="1" fill="#1a7a3c" stroke="none"/>
      </svg>
    </div>
    <div class="header-info">
      <h1>TITSA Asistente</h1>
      <p>Horarios y líneas de Tenerife</p>
    </div>
    <div class="status"><div class="status-dot"></div><span>En línea</span></div>
  </div>

  <div class="ctx-banner" id="ctx-banner" style="display:none">
    <span class="ctx-texto" id="ctx-texto"></span>
    <button class="ctx-reset" onclick="resetCtx()">Cambiar</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="chips" id="chips" style="display:none">
    <button class="chip" onclick="sendChip('horarios laborable')">Laborable</button>
    <button class="chip" onclick="sendChip('horarios sabado')">Sábado</button>
    <button class="chip" onclick="sendChip('horarios domingo')">Domingo</button>
    <button class="chip" onclick="sendChip('paradas')">Paradas</button>
  </div>

  <div class="input-area">
    <input class="chat-input" id="input" type="text" placeholder="Línea 103 · parada 2625 · ir al aeropuerto…" />
    <button class="send-btn" id="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>

<script>
const DATA_URL = 'data/titsa_completo.json';
let DB = null;
let ctx = null;
let hist = [];

// Cargar datos al inicio
fetch(DATA_URL)
  .then(r => r.json())
  .then(data => {
    DB = data;
    document.getElementById('loading-overlay').style.display = 'none';
    addBot('¡Hola! Soy el asistente de TITSA 🚌<br>' +
      'Tengo datos reales de <strong>' + Object.keys(DB.lineas).length + ' líneas</strong> y <strong>' + Object.keys(DB.paradas).length + ' paradas</strong>.<br><br>' +
      '• <strong>Línea:</strong> "103", "línea 50"<br>' +
      '• <strong>Parada:</strong> "2625", "parada 1234"<br>' +
      '• <strong>Ruta:</strong> "cómo ir de La Laguna al aeropuerto"');
  })
  .catch(() => {
    document.getElementById('loading-overlay').style.display = 'none';
    addBot('Error cargando datos. Recarga la página.');
  });

document.getElementById('input').addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

function now() { return new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}); }

function addBot(html) {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = `<div class="bubble">${html}</div><span class="msg-time">${now()}</span>`;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function addUser(text) {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="bubble">${text}</div><span class="msg-time">${now()}</span>`;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.id = 'typing'; el.className = 'msg bot';
  el.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chat.appendChild(el); chat.scrollTop = chat.scrollHeight;
}

function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function setLoading(on) { document.getElementById('input').disabled = on; document.getElementById('send-btn').disabled = on; }

function setCtx(tipo, datos, label) {
  ctx = { tipo, datos };
  document.getElementById('ctx-texto').textContent = label;
  document.getElementById('ctx-banner').style.display = 'flex';
  document.getElementById('chips').style.display = tipo === 'linea' ? 'flex' : 'none';
}

function resetCtx() {
  ctx = null; hist = [];
  document.getElementById('ctx-banner').style.display = 'none';
  document.getElementById('chips').style.display = 'none';
  addBot('Contexto borrado. ¿Qué línea, parada o ruta quieres consultar?');
}

// ── Detección ──────────────────────────────────────────────────────────────
function detectaLinea(t) {
  const txt = t.toLowerCase();
  if (/\b\d{4,}\b/.test(txt)) return null;
  let m = txt.match(/l[ií]nea\s+0*(\d{1,3})\b/);
  if (m) return m[1];
  m = txt.match(/^0*(\d{1,3})$/);
  if (m) return m[1];
  m = txt.match(/\b0*(\d{1,3})\b/);
  if (m && !txt.includes('parada')) return m[1];
  return null;
}

function detectaParada(t) {
  const txt = t.toLowerCase();
  let m = txt.match(/(?:parada|stop)\s+(\d{3,5})\b/);
  if (m) return m[1];
  m = txt.match(/\b(\d{4,5})\b/);
  if (m) return m[1];
  return null;
}

function detectaRuta(t) {
  return /c[oó]mo\s+(ir|llegar|voy)|qu[eé]\s+(guagua|l[ií]nea)\s+(tengo|coger|tomo|va)|(?:ir|llegar)\s+(?:desde|de)|(?:desde|de)\s+.+\s+(?:hasta|a\s+)|para\s+ir\s+a|cómo\s+llego/i.test(t);
}

function detectaTipoHorario(t) {
  const txt = t.toLowerCase();
  if (/s[aá]bado/.test(txt)) return 'S';
  if (/domingo|festivo/.test(txt)) return 'D';
  return 'L';
}

function normalizar(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9\s]/g, ' ').trim();
}

// ── Búsqueda de rutas ──────────────────────────────────────────────────────
function buscarParadasPorNombre(query) {
  const q = normalizar(query);
  const words = q.split(/\s+/).filter(w => w.length > 2);
  const resultados = [];
  for (const [id, p] of Object.entries(DB.paradas)) {
    const nombre = normalizar(p.nombre);
    const score = words.filter(w => nombre.includes(w)).length;
    if (score > 0) resultados.push({ id, nombre: p.nombre, lineas: p.lineas, score });
  }
  return resultados.sort((a, b) => b.score - a.score).slice(0, 5);
}

function buscarRuta(origen, destino) {
  const paradasOrigen = buscarParadasPorNombre(origen);
  const paradasDestino = buscarParadasPorNombre(destino);

  if (!paradasOrigen.length || !paradasDestino.length) {
    return { error: true, paradasOrigen, paradasDestino };
  }

  const lineasOrigen = new Set(paradasOrigen.flatMap(p => p.lineas));
  const lineasDestino = new Set(paradasDestino.flatMap(p => p.lineas));

  // Líneas directas
  const directas = [...lineasOrigen].filter(l => lineasDestino.has(l));

  if (directas.length) {
    return {
      tipo: 'directa',
      paradasOrigen,
      paradasDestino,
      lineas: directas.map(num => ({ num, ...DB.lineas[num] })).filter(l => l.nombre)
    };
  }

  // Transbordos: buscar paradas comunes
  const transbordos = [];
  for (const lo of paradasOrigen) {
    for (const ld of paradasDestino) {
      const comunes = lo.lineas.filter(l1 =>
        ld.lineas.some(l2 => {
          // Misma parada intermedia
          const l1data = DB.lineas[l1];
          const l2data = DB.lineas[l2];
          if (!l1data || !l2data) return false;
          const paradasL1 = new Set(l1data.paradas.map(p => p.id));
          return l2data.paradas.some(p => paradasL1.has(p.id));
        })
      );
      if (comunes.length) {
        transbordos.push({ linea1: comunes[0], desde: lo, hasta: ld });
      }
    }
  }

  return {
    tipo: 'transbordo',
    paradasOrigen,
    paradasDestino,
    transbordos: transbordos.slice(0, 3)
  };
}

// ── Formateadores ──────────────────────────────────────────────────────────
function fmtHora(h) {
  if (!h) return '-';
  // Normalizar horas > 24 (formato GTFS)
  const parts = h.split(':');
  let hh = parseInt(parts[0]);
  const mm = parts[1] || '00';
  if (hh >= 24) hh -= 24;
  return `${String(hh).padStart(2,'0')}:${mm}`;
}

function fmtHorarios(linea, num, tipo) {
  const h = linea.horarios[tipo];
  if (!h || !Object.keys(h).length) return `No hay horarios de ${tipo === 'S' ? 'sábado' : tipo === 'D' ? 'domingo' : 'laborable'} para esta línea.`;

  const tipoNombre = tipo === 'S' ? 'Sábado' : tipo === 'D' ? 'Domingo / Festivo' : 'Laborable';
  let html = `<strong>Línea ${num} — Horarios ${tipoNombre}</strong><table><tr>`;

  const destinos = Object.entries(h);
  destinos.forEach(([dest, info]) => {
    html += `<th>${dest.split('(')[0].trim()}</th>`;
  });
  html += '</tr><tr>';
  destinos.forEach(([dest, info]) => {
    html += `<td><strong>${fmtHora(info.primero)}</strong> — <strong>${fmtHora(info.ultimo)}</strong><br><small style="color:var(--texto-suave)">${info.total} salidas</small></td>`;
  });
  html += '</tr></table>';
  return html;
}

function fmtParadas(linea, num) {
  const paradas = linea.paradas || [];
  let html = `<strong>Línea ${num} — ${paradas.length} paradas</strong><br><br>`;
  paradas.forEach((p, i) => {
    html += `<span class="parada-id">${p.id}</span> ${p.nombre}<br>`;
  });
  return html;
}

function fmtLineaResumen(linea, num) {
  let html = `<strong>Línea ${num} — ${linea.nombre}</strong><br><br>`;
  const h = linea.horarios;
  if (h.L && Object.keys(h.L).length) {
    const dest = Object.keys(h.L);
    dest.forEach(d => {
      html += `<strong>→ ${d.split('(')[0].trim()}</strong><br>`;
      html += `Laborable: <strong>${fmtHora(h.L[d].primero)}</strong> – <strong>${fmtHora(h.L[d].ultimo)}</strong> (${h.L[d].total} salidas)<br>`;
      if (h.S && h.S[d]) html += `Sábado: <strong>${fmtHora(h.S[d].primero)}</strong> – <strong>${fmtHora(h.S[d].ultimo)}</strong><br>`;
      if (h.D && h.D[d]) html += `Domingo: <strong>${fmtHora(h.D[d].primero)}</strong> – <strong>${fmtHora(h.D[d].ultimo)}</strong><br>`;
      html += '<br>';
    });
  }
  html += `${linea.paradas.length} paradas en el recorrido.<br>`;
  html += '¿Qué necesitas? Pulsa un botón o pregúntame.';
  return html;
}

function fmtParadaInfo(id) {
  const p = DB.paradas[id];
  if (!p) return `No encontré la parada <strong>${id}</strong>.`;
  let html = `<strong>Parada ${id} — ${p.nombre}</strong><br><br>`;
  html += `<strong>${p.lineas.length} líneas paran aquí:</strong><br>`;
  p.lineas.forEach(num => {
    const l = DB.lineas[num];
    const nombre = l ? l.nombre : num;
    html += `<div style="margin:3px 0"><span class="linea-badge">${num}</span> ${nombre}</div>`;
  });
  return html;
}

function fmtRuta(resultado, ori, dst) {
  if (resultado.error) {
    let html = `No encontré paradas para esa ruta.<br><br>`;
    if (!resultado.paradasOrigen.length) html += `No hay paradas con "<strong>${ori}</strong>".<br>`;
    if (!resultado.paradasDestino.length) html += `No hay paradas con "<strong>${dst}</strong>".<br>`;
    html += `<br>Prueba con nombres más cortos como: "laguna", "aeropuerto", "santa cruz", "puerto cruz".`;
    return html;
  }

  const oriNombre = resultado.paradasOrigen[0].nombre;
  const dstNombre = resultado.paradasDestino[0].nombre;

  if (resultado.tipo === 'directa') {
    let html = `<strong>De ${oriNombre} a ${dstNombre}</strong><br><br>`;
    html += `<strong>✅ ${resultado.lineas.length} línea${resultado.lineas.length > 1 ? 's' : ''} directa${resultado.lineas.length > 1 ? 's' : ''}:</strong><br><br>`;
    resultado.lineas.slice(0, 4).forEach(l => {
      const hL = l.horarios?.L;
      const primDest = hL ? Object.values(hL)[0] : null;
      html += `<div style="background:var(--verde-bg);border-left:3px solid var(--verde);border-radius:0 8px 8px 0;padding:8px 10px;margin:4px 0">`;
      html += `<span class="linea-badge">${l.num}</span> <strong>${l.nombre}</strong><br>`;
      if (primDest) {
        html += `<small style="color:var(--texto-suave)">Laborable: ${fmtHora(primDest.primero)} – ${fmtHora(primDest.ultimo)} · ${primDest.total} salidas</small>`;
      }
      html += `</div>`;
    });
    return html;
  }

  return `<strong>De ${oriNombre} a ${dstNombre}</strong><br><br>No hay línea directa. Consulta transbordos en <a href="https://www.titsa.com" target="_blank">titsa.com</a>.`;
}

// ── Motor principal ────────────────────────────────────────────────────────
async function handleSend() {
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  await process(text);
}

async function sendChip(text) { await process(text); }

async function process(text) {
  if (!DB) { addBot('Los datos aún se están cargando, espera un momento.'); return; }
  addUser(text);
  setLoading(true);
  showTyping();

  await new Promise(r => setTimeout(r, 150));

  const txt = text.toLowerCase();

  // ── Paradas del recorrido
  if (/paradas?|recorrido/.test(txt) && ctx?.tipo === 'linea') {
    hideTyping();
    addBot(fmtParadas(ctx.datos, ctx.num));
    setLoading(false);
    return;
  }

  // ── Número de línea
  const numLinea = detectaLinea(text);
  if (numLinea) {
    const linea = DB.lineas[numLinea];
    hideTyping();
    if (!linea) {
      addBot(`No encontré la línea <strong>${numLinea}</strong> en los datos de TITSA.`);
    } else {
      const tipo = detectaTipoHorario(text);
      const pideParadas = /paradas?|recorrido/.test(txt);
      const pideHorarios = /horario|salida|hora/.test(txt);
      setCtx('linea', linea, `Línea ${numLinea} — ${linea.nombre}`);
      ctx.num = numLinea;
      if (pideParadas) addBot(fmtParadas(linea, numLinea));
      else if (pideHorarios) addBot(fmtHorarios(linea, numLinea, tipo));
      else addBot(fmtLineaResumen(linea, numLinea));
    }
    setLoading(false);
    return;
  }

  // ── Número de parada
  const numParada = detectaParada(text);
  if (numParada) {
    hideTyping();
    if (!DB.paradas[numParada]) {
      addBot(`No encontré la parada <strong>${numParada}</strong>.`);
    } else {
      setCtx('parada', DB.paradas[numParada], `Parada ${numParada} — ${DB.paradas[numParada].nombre}`);
      addBot(fmtParadaInfo(numParada));
    }
    setLoading(false);
    return;
  }

  // ── Ruta
  if (detectaRuta(text)) {
    let origen = '', destino = '';
    let m = text.match(/(?:desde|de)\s+(.+?)\s+(?:hasta|al?|hacia)\s+(.+?)(?:\?|$)/i);
    if (m) { origen = m[1].trim(); destino = m[2].trim(); }
    else {
      m = text.match(/(?:cómo|como)\s+(?:ir|llegar|voy)\s+(?:al?|hasta|a)\s+(.+?)(?:\s+desde\s+(.+?))?(?:\?|$)/i);
      if (m) { destino = m[1].trim(); origen = (m[2] || '').trim(); }
    }
    hideTyping();
    if (!destino) {
      addBot('Dime origen y destino. Ejemplo: <strong>"cómo ir de La Laguna al aeropuerto"</strong>');
    } else if (!origen) {
      addBot(`¿Desde dónde quieres ir a <strong>${destino}</strong>?`);
    } else {
      const resultado = buscarRuta(origen, destino);
      addBot(fmtRuta(resultado, origen, destino));
    }
    setLoading(false);
    return;
  }

  // ── Con contexto activo
  if (ctx?.tipo === 'linea') {
    const tipo = detectaTipoHorario(text);
    hideTyping();
    addBot(fmtHorarios(ctx.datos, ctx.num, tipo));
    setLoading(false);
    return;
  }

  if (ctx?.tipo === 'parada') {
    hideTyping();
    addBot(fmtParadaInfo(Object.keys(DB.paradas).find(id => DB.paradas[id] === ctx.datos)));
    setLoading(false);
    return;
  }

  // ── Sin contexto
  hideTyping();
  addBot('No entendí la consulta. Puedes decirme:<br>• <strong>Número de línea:</strong> "103" o "línea 50"<br>• <strong>Número de parada:</strong> "2625"<br>• <strong>Ruta:</strong> "cómo ir de La Laguna al aeropuerto"');
  setLoading(false);
}
</script>
</body>
</html>
