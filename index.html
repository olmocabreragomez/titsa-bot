<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TITSA – Asistente</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #1a7a3c; --amarillo: #f5c800; --amarillo-texto: #1a4a22;
      --fondo: #f4f4f0; --blanco: #ffffff; --texto: #1a1a1a;
      --texto-suave: #666; --borde: rgba(0,0,0,0.1);
    }
    body { background: var(--fondo); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .app { width: 100%; max-width: 440px; display: flex; flex-direction: column; height: 100vh; max-height: 780px; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
    .header { background: var(--verde); padding: 14px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-icon { width: 38px; height: 38px; background: var(--amarillo); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-icon svg { width: 22px; height: 22px; }
    .header-info h1 { font-size: 15px; font-weight: 600; color: #fff; }
    .header-info p { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 1px; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.7); }
    .status-dot { width: 7px; height: 7px; background: #5dde8a; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(93,222,138,0.4); } 50% { box-shadow: 0 0 0 4px rgba(93,222,138,0); } }

    #config-panel { display: flex; align-items: center; gap: 6px; padding: 8px 12px; flex-shrink: 0; background: #fff8e1; border-bottom: 1px solid #f5c800; }
    #config-panel label { font-size: 11px; color: #795900; white-space: nowrap; }
    #apikey-field { flex:1; font-size: 11px; font-family:'DM Mono',monospace; padding: 4px 8px; border:1px solid #f5c800; border-radius:6px; min-width: 0; }
    #save-key-btn { background:var(--verde); color:#fff; border:none; border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer; white-space:nowrap; }

    .context-banner { background: var(--amarillo); padding: 9px 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-shrink: 0; }
    .context-texto { font-size: 12px; font-weight: 500; color: var(--amarillo-texto); }
    .context-reset { font-size: 11px; color: var(--verde); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: 'DM Sans', sans-serif; }

    .chat { flex: 1; overflow-y: auto; background: var(--fondo); padding: 16px 12px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 92%; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .bot .bubble { background: var(--blanco); border: 1px solid var(--borde); color: var(--texto); border-radius: 4px 16px 16px 16px; padding: 10px 14px; font-size: 13.5px; line-height: 1.6; }
    .user .bubble { background: var(--verde); color: #fff; border-radius: 16px 4px 16px 16px; padding: 10px 14px; font-size: 13.5px; line-height: 1.6; }
    .msg-time { font-size: 10px; color: var(--texto-suave); padding: 0 4px; }

    /* Tablas de horarios */
    .bubble table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 12px; }
    .bubble th { background: var(--verde); color: white; padding: 5px 8px; text-align: left; font-weight: 600; }
    .bubble td { padding: 4px 8px; border-bottom: 1px solid var(--borde); }
    .bubble tr:nth-child(even) td { background: #f9f9f7; }

    /* Listas de paradas */
    .bubble .parada-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12.5px; }
    .bubble .parada-id { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--verde); background: rgba(26,122,60,0.1); padding: 1px 5px; border-radius: 4px; flex-shrink: 0; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px 4px; background: var(--fondo); flex-shrink: 0; }
    .chip { font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--borde); background: var(--blanco); color: var(--texto); cursor: pointer; transition: all 0.15s; }
    .chip:hover { background: var(--verde); color: #fff; border-color: var(--verde); }

    .input-area { background: var(--blanco); padding: 10px 12px; display: flex; gap: 8px; align-items: center; border-top: 1px solid var(--borde); flex-shrink: 0; }
    .chat-input { flex: 1; border: 1px solid var(--borde); border-radius: 22px; padding: 9px 16px; font-size: 13.5px; font-family: 'DM Sans', sans-serif; background: var(--fondo); color: var(--texto); outline: none; transition: border-color 0.15s; }
    .chat-input:focus { border-color: var(--verde); }
    .chat-input:disabled { opacity: 0.5; }
    .send-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--verde); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity 0.15s; }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }
    .send-btn svg { width: 15px; height: 15px; }

    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 14px; background: var(--blanco); border: 1px solid var(--borde); border-radius: 4px 16px 16px 16px; width: fit-content; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a7a3c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10h18M3 10l3-6h12l3 6M3 10v8a1 1 0 001 1h1m15-9v8a1 1 0 01-1 1h-1M7 19h10M7 19a2 2 0 01-2-2v-1h14v1a2 2 0 01-2 2"/>
        <circle cx="7.5" cy="19.5" r="1" fill="#1a7a3c" stroke="none"/>
        <circle cx="16.5" cy="19.5" r="1" fill="#1a7a3c" stroke="none"/>
      </svg>
    </div>
    <div class="header-info">
      <h1>TITSA Asistente</h1>
      <p>Horarios y líneas de Tenerife</p>
    </div>
    <div class="status"><div class="status-dot"></div><span>En línea</span></div>
  </div>

  <div id="config-panel">
    <label>🔑 OpenAI API Key:</label>
    <input id="apikey-field" type="password" placeholder="sk-..." />
    <button id="save-key-btn" onclick="saveKey()">Guardar</button>
  </div>

  <div class="context-banner" id="context-banner" style="display:none">
    <span class="context-texto" id="context-texto"></span>
    <button class="context-reset" onclick="resetContexto()">Cambiar</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="chips" id="chips" style="display:none">
    <button class="chip" onclick="sendChip('Horarios de hoy')">Horarios hoy</button>
    <button class="chip" onclick="sendChip('Todas las paradas')">Paradas</button>
    <button class="chip" onclick="sendChip('Horarios del sábado')">Sábado</button>
    <button class="chip" onclick="sendChip('Horarios del domingo')">Domingo</button>
  </div>

  <div class="input-area">
    <input class="chat-input" id="input" type="text" placeholder="Ej: línea 103, parada 2625, ir al aeropuerto…" />
    <button class="send-btn" id="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>

<script>
const PROXY = 'https://titsa-proxy-p1z7.vercel.app';
let OPENAI_KEY = localStorage.getItem('titsa_openai_key') || '';
let contexto = null; // { tipo: 'linea'|'parada', datos: {...} }
let historial = [];

if (OPENAI_KEY) document.getElementById('config-panel').style.display = 'none';
document.getElementById('input').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleSend(); });

addBotMsg('Hola! Soy el asistente de TITSA.<br>Puedes preguntarme por:<br><strong>• Líneas:</strong> "línea 103", "horarios del 50"<br><strong>• Paradas:</strong> "parada 2625", "qué guaguas paran en 1234"<br><strong>• Rutas:</strong> "cómo ir de La Laguna al aeropuerto"');

function saveKey() {
  var val = document.getElementById('apikey-field').value.trim();
  if (!val.startsWith('sk-')) { alert('La key debe empezar por sk-'); return; }
  OPENAI_KEY = val;
  localStorage.setItem('titsa_openai_key', val);
  document.getElementById('config-panel').style.display = 'none';
}

function now() {
  return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

function addBotMsg(html) {
  var chat = document.getElementById('chat');
  var el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = '<div class="bubble">' + html + '</div><span class="msg-time">' + now() + '</span>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function addUserMsg(text) {
  var chat = document.getElementById('chat');
  var el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = '<div class="bubble">' + text + '</div><span class="msg-time">' + now() + '</span>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  var chat = document.getElementById('chat');
  var el = document.createElement('div');
  el.id = 'typing'; el.className = 'msg bot';
  el.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() { var t = document.getElementById('typing'); if (t) t.remove(); }

function setLoading(on) {
  document.getElementById('input').disabled = on;
  document.getElementById('send-btn').disabled = on;
}

function setContexto(tipo, datos, label) {
  contexto = { tipo, datos };
  document.getElementById('context-texto').textContent = label;
  document.getElementById('context-banner').style.display = 'flex';
  document.getElementById('chips').style.display = 'flex';
}

function resetContexto() {
  contexto = null;
  historial = [];
  document.getElementById('context-banner').style.display = 'none';
  document.getElementById('chips').style.display = 'none';
  addBotMsg('Contexto borrado. ¿Sobre qué línea o parada quieres consultar?');
}

// ── Detectores ────────────────────────────────────────────────────────────

function detectarNumeroLinea(texto) {
  var m = texto.match(/l[ií]nea\s+0*(\d{1,3})/i) ||
          texto.match(/(?:horarios?|recorrido|paradas?)\s+(?:de(?:l|la)?\s+)?(?:la\s+)?(?:l[ií]nea\s+)?0*(\d{1,3})/i) ||
          texto.match(/^0*(\d{1,3})$/);
  return m ? m[1] : null;
}

function detectarNumeroParada(texto) {
  var m = texto.match(/parada\s+(\d{3,5})/i) ||
          texto.match(/stop\s+(\d{3,5})/i) ||
          texto.match(/(?:estoy en|en la)\s+(\d{3,5})/i);
  return m ? m[1] : null;
}

function esConsultaRuta(texto) {
  return /c[oó]mo\s+(?:ir|llegar|voy|viajar)|qu[eé]\s+(?:guagua|l[ií]nea|autob[uú]s)\s+(?:tengo\s+que\s+coger|coger|tomo|va|lleva)|(?:ir|llegar|voy)\s+(?:desde|de)\s+\w+\s+(?:hasta|a)\s+\w+|(?:desde|de)\s+.+\s+(?:hasta|a)\s+/i.test(texto);
}

// ── Llamadas al proxy ─────────────────────────────────────────────────────

async function fetchLinea(num) {
  var r = await fetch(PROXY + '/api/titsa?linea=' + num);
  return r.json();
}

async function fetchParada(id) {
  var r = await fetch(PROXY + '/api/titsa?parada=' + id);
  return r.json();
}

async function fetchRuta(origen, destino) {
  var r = await fetch(PROXY + '/api/titsa?origen=' + encodeURIComponent(origen) + '&destino=' + encodeURIComponent(destino));
  return r.json();
}

// ── Formatear respuestas SIN IA ───────────────────────────────────────────

function formatLinea(datos, pregunta) {
  var p = (pregunta || '').toLowerCase();
  var html = '<strong>Línea ' + datos.num + ' — ' + datos.nombre + '</strong><br><br>';

  // Paradas
  if (p.includes('parada') || p.includes('recorrido') || p.includes('para')) {
    html += '<strong>Recorrido (' + datos.recorrido.length + ' paradas):</strong><br>';
    datos.recorrido.forEach(function(p, i) {
      html += '<div class="parada-item"><span class="parada-id">' + p.id + '</span> ' + (i+1) + '. ' + p.nombre + '</div>';
    });
    return html;
  }

  // Horarios
  var tipo = 'laborable';
  if (p.includes('sábado') || p.includes('sabado')) tipo = 'sabado';
  else if (p.includes('domingo') || p.includes('festivo')) tipo = 'domingo';

  var horas = datos.horarios[tipo] || [];
  if (!horas.length && tipo !== 'laborable') horas = datos.horarios.laborable || [];

  html += '<strong>Horarios ' + tipo + ' (' + horas.length + ' salidas):</strong>';
  html += '<table><tr><th>Salida</th><th>Salida</th><th>Salida</th><th>Salida</th></tr>';
  for (var i = 0; i < horas.length; i += 4) {
    html += '<tr>';
    for (var j = 0; j < 4; j++) {
      html += '<td>' + (horas[i+j] || '') + '</td>';
    }
    html += '</tr>';
  }
  html += '</table>';

  // Resumen recorrido
  if (datos.recorrido.length > 0) {
    var primera = datos.recorrido[0].nombre;
    var ultima = datos.recorrido[datos.recorrido.length - 1].nombre;
    html += '<br><small>Recorrido: ' + primera + ' → ' + ultima + ' (' + datos.recorrido.length + ' paradas)</small>';
  }

  return html;
}

function formatParada(datos) {
  var html = '<strong>Parada ' + datos.id + ' — ' + datos.nombre + '</strong><br><br>';
  if (!datos.lineas || !datos.lineas.length) {
    return html + 'No se encontraron líneas para esta parada.';
  }
  html += '<strong>Líneas que paran aquí (' + datos.lineas.length + '):</strong><br>';
  datos.lineas.forEach(function(l) {
    html += '<div class="parada-item"><span class="parada-id">' + l.num + '</span> ' + l.nombre + '</div>';
  });
  return html;
}

function formatRuta(datos) {
  var html = '';

  if (datos.directas && datos.directas.length) {
    html += '<strong>Líneas directas:</strong><br>';
    datos.directas.forEach(function(l) {
      var horas = l.horarios_laborable || [];
      html += '<div class="parada-item"><span class="parada-id">' + l.num + '</span> ' + l.nombre + '</div>';
      if (horas.length) {
        html += '<small>Primeras salidas: ' + horas.slice(0, 5).join(', ') + (horas.length > 5 ? '...' : '') + '</small><br>';
      }
    });
  } else if (datos.transbordos && datos.transbordos.length) {
    html += '<strong>No hay línea directa. Opciones con transbordo:</strong><br><br>';
    datos.transbordos.forEach(function(t, i) {
      html += '<strong>Opción ' + (i+1) + ':</strong><br>';
      html += '<div class="parada-item"><span class="parada-id">' + t.linea1.num + '</span> ' + t.linea1.nombre + '</div>';
      html += '↓ transbordo en <strong>' + t.transbordo.nombre + '</strong> (parada ' + t.transbordo.id + ')<br>';
      html += '<div class="parada-item"><span class="parada-id">' + t.linea2.num + '</span> ' + t.linea2.nombre + '</div><br>';
    });
  } else {
    html += 'No se encontró ninguna ruta directa ni con transbordo entre esos puntos.<br>';
    html += 'Comprueba los nombres de las paradas en <a href="https://www.titsa.com" target="_blank">titsa.com</a>.';
  }

  if (datos.origen && datos.origen.length) {
    html += '<br><small>Paradas de origen encontradas: ' + datos.origen.map(function(p){ return p.nombre + ' (' + p.id + ')'; }).join(', ') + '</small>';
  }
  if (datos.destino && datos.destino.length) {
    html += '<br><small>Paradas de destino encontradas: ' + datos.destino.map(function(p){ return p.nombre + ' (' + p.id + ')'; }).join(', ') + '</small>';
  }

  return html;
}

// ── Extraer origen/destino para rutas ────────────────────────────────────

function extraerRuta(texto) {
  var m = texto.match(/(?:desde|de)\s+(.+?)\s+(?:hasta|a|al|hacia)\s+(.+?)(?:\?|$)/i);
  if (m) return { origen: m[1].trim(), destino: m[2].trim() };

  m = texto.match(/(?:ir|llegar|voy|viajar)\s+(?:al?|hasta)\s+(.+?)(?:\s+desde\s+(.+?))?(?:\?|$)/i);
  if (m) return { origen: m[2] ? m[2].trim() : '', destino: m[1].trim() };

  // Intentar con IA si no se puede parsear
  return null;
}

// ── Motor principal ───────────────────────────────────────────────────────

async function handleSend() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  await processMessage(text);
}

async function sendChip(text) { await processMessage(text); }

async function processMessage(text) {
  if (!OPENAI_KEY) {
    addBotMsg('Introduce tu API Key de OpenAI arriba y pulsa <strong>Guardar</strong>.');
    return;
  }

  addUserMsg(text);
  setLoading(true);
  showTyping();

  try {
    // 1. ¿Número de línea?
    var numLinea = detectarNumeroLinea(text);
    if (numLinea) {
      var datos = await fetchLinea(numLinea);
      if (datos.error) {
        removeTyping();
        addBotMsg('No encontré la línea <strong>' + numLinea + '</strong> en TITSA.');
        setLoading(false);
        return;
      }
      setContexto('linea', datos, 'Línea ' + datos.num + ' — ' + datos.nombre);
      historial = [];
      removeTyping();
      addBotMsg(formatLinea(datos, text));
      setLoading(false);
      return;
    }

    // 2. ¿Número de parada?
    var numParada = detectarNumeroParada(text);
    if (numParada) {
      var datosP = await fetchParada(numParada);
      if (datosP.error) {
        removeTyping();
        addBotMsg('No encontré la parada <strong>' + numParada + '</strong>.');
        setLoading(false);
        return;
      }
      setContexto('parada', datosP, 'Parada ' + datosP.id + ' — ' + datosP.nombre);
      historial = [];
      removeTyping();
      addBotMsg(formatParada(datosP));
      setLoading(false);
      return;
    }

    // 3. ¿Consulta de ruta?
    if (esConsultaRuta(text)) {
      var ruta = extraerRuta(text);
      if (ruta && ruta.origen && ruta.destino) {
        var datosR = await fetchRuta(ruta.origen, ruta.destino);
        removeTyping();
        addBotMsg(formatRuta(datosR));
        setLoading(false);
        return;
      }
      // Si no se pudo extraer origen/destino, pedir aclaración
      removeTyping();
      addBotMsg('Para buscar una ruta dime el origen y el destino. Por ejemplo:<br><strong>"cómo ir de La Laguna al aeropuerto"</strong>');
      setLoading(false);
      return;
    }

    // 4. Si hay contexto activo, preguntas de seguimiento con IA
    if (contexto) {
      historial.push({ role: 'user', content: text });
      var respuesta = await llamarOpenAI(text);
      removeTyping();
      addBotMsg(respuesta);
      historial.push({ role: 'assistant', content: respuesta });
      setLoading(false);
      return;
    }

    // 5. Sin contexto, pedir aclaración
    removeTyping();
    addBotMsg('Dime el número de línea, el número de parada, o pregúntame cómo ir de un sitio a otro.<br><br>Ejemplos:<br>• <strong>línea 103</strong><br>• <strong>parada 2625</strong><br>• <strong>cómo ir de La Laguna al Puerto de la Cruz</strong>');
    setLoading(false);

  } catch(e) {
    removeTyping();
    addBotMsg('Error de conexión: ' + e.message);
    setLoading(false);
  }
}

// ── OpenAI solo para preguntas de seguimiento con contexto ───────────────

async function llamarOpenAI(pregunta) {
  var ctx = '';
  if (contexto && contexto.tipo === 'linea') {
    var d = contexto.datos;
    var horasLab = (d.horarios.laborable || []).join(', ');
    var horasSab = (d.horarios.sabado || []).join(', ');
    var horasDom = (d.horarios.domingo || []).join(', ');
    var paradas = d.recorrido.map(function(p, i){ return (i+1) + '. [' + p.id + '] ' + p.nombre; }).join('\n');
    ctx = 'LINEA ' + d.num + ': ' + d.nombre + '\nPARADAS:\n' + paradas +
          '\nHORARIOS LABORABLE: ' + horasLab +
          '\nHORARIOS SABADO: ' + horasSab +
          '\nHORARIOS DOMINGO/FESTIVO: ' + horasDom;
  } else if (contexto && contexto.tipo === 'parada') {
    var dp = contexto.datos;
    ctx = 'PARADA ' + dp.id + ': ' + dp.nombre + '\nLINEAS: ' + dp.lineas.map(function(l){ return l.num + ' (' + l.nombre + ')'; }).join(', ');
  }

  var sistema = 'Eres el asistente de TITSA (Transportes Interurbanos de Tenerife). ' +
    'Responde en español, de forma breve y clara. Usa solo <strong> y <br> para formatear, nunca asteriscos ni almohadillas. ' +
    'USA EXCLUSIVAMENTE los datos que te proporciono. NUNCA inventes horarios, paradas ni líneas.\n\n' + ctx;

  var res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + OPENAI_KEY },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      max_tokens: 400,
      messages: [{ role: 'system', content: sistema }].concat(historial)
    })
  });

  if (!res.ok) { var e = await res.json(); throw new Error(e.error ? e.error.message : res.statusText); }
  var data = await res.json();
  return data.choices[0].message.content;
}
