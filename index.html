<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TITSA – Asistente de Guaguas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --verde: #1a7a3c; --verde-bg: rgba(26,122,60,0.08); --amarillo: #f5c800; --amarillo-texto: #6b4f00; --fondo: #f0f0ec; --blanco: #fff; --texto: #1a1a1a; --texto-suave: #777; --borde: rgba(0,0,0,0.09); }
    body { background: var(--fondo); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 0.75rem; }
    .app { width: 100%; max-width: 460px; display: flex; flex-direction: column; height: 100vh; max-height: 820px; border-radius: 22px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.11); background: var(--blanco); }
    .header { background: var(--verde); padding: 13px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-icon { width: 36px; height: 36px; background: var(--amarillo); border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-icon svg { width: 20px; height: 20px; }
    .header-info h1 { font-size: 14px; font-weight: 600; color: #fff; }
    .header-info p { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 1px; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 10px; color: rgba(255,255,255,0.65); }
    .status-dot { width: 6px; height: 6px; background: #5dde8a; border-radius: 50%; animation: pulse 2.5s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(93,222,138,0.5); } 50% { box-shadow: 0 0 0 4px rgba(93,222,138,0); } }
    .ctx-banner { background: var(--amarillo); padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .ctx-texto { font-size: 12px; font-weight: 600; color: var(--amarillo-texto); }
    .ctx-reset { font-size: 11px; color: var(--verde); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: 'DM Sans', sans-serif; }
    .chat { flex: 1; overflow-y: auto; background: var(--fondo); padding: 14px 11px; display: flex; flex-direction: column; gap: 11px; scroll-behavior: smooth; }
    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 93%; animation: fadeUp 0.18s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .msg.bot { align-self: flex-start; } .msg.user { align-self: flex-end; }
    .bot .bubble { background: var(--blanco); border: 1px solid var(--borde); color: var(--texto); border-radius: 3px 16px 16px 16px; padding: 10px 13px; font-size: 13px; line-height: 1.6; }
    .user .bubble { background: var(--verde); color: #fff; border-radius: 16px 3px 16px 16px; padding: 10px 13px; font-size: 13px; }
    .msg-time { font-size: 10px; color: var(--texto-suave); padding: 0 4px; }
    .bubble table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 12px; }
    .bubble th { background: var(--verde); color: #fff; padding: 6px 8px; text-align: center; font-weight: 600; font-size: 11px; line-height: 1.3; }
    .bubble td { padding: 4px 8px; border-bottom: 1px solid var(--borde); text-align: center; }
    .bubble tr:nth-child(even) td { background: #f7f7f4; }
    .linea-badge { display: inline-block; background: var(--verde); color: #fff; font-family: 'DM Mono', monospace; font-size: 11px; padding: 1px 7px; border-radius: 5px; margin-right: 4px; }
    .parada-id { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--verde); background: var(--verde-bg); padding: 1px 5px; border-radius: 4px; margin-right: 4px; }
    .ruta-bloque { background: var(--verde-bg); border-left: 3px solid var(--verde); border-radius: 0 8px 8px 0; padding: 8px 10px; margin: 4px 0; }
    .transbordo-tag { display: inline-block; background: var(--amarillo); color: var(--amarillo-texto); font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px; }
    .chips { display: flex; flex-wrap: wrap; gap: 5px; padding: 7px 11px 4px; background: var(--fondo); flex-shrink: 0; }
    .chip { font-size: 11.5px; font-family: 'DM Sans', sans-serif; padding: 5px 11px; border-radius: 18px; border: 1px solid var(--borde); background: var(--blanco); color: var(--texto); cursor: pointer; transition: all 0.13s; }
    .chip:hover { background: var(--verde); color: #fff; border-color: var(--verde); }
    .input-area { background: var(--blanco); padding: 9px 11px; display: flex; gap: 7px; align-items: center; border-top: 1px solid var(--borde); flex-shrink: 0; }
    .chat-input { flex: 1; border: 1px solid var(--borde); border-radius: 20px; padding: 9px 15px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--fondo); color: var(--texto); outline: none; transition: border-color 0.13s; }
    .chat-input:focus { border-color: var(--verde); }
    .chat-input:disabled { opacity: 0.5; }
    .send-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--verde); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .send-btn:hover { opacity: 0.82; } .send-btn:disabled { opacity: 0.38; cursor: default; }
    .send-btn svg { width: 14px; height: 14px; }
    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 13px; background: var(--blanco); border: 1px solid var(--borde); border-radius: 3px 16px 16px 16px; width: fit-content; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }
    #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 999; color: #fff; font-size: 14px; flex-direction: column; gap: 10px; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="loading-overlay"><div class="spinner"></div><span>Cargando datos de TITSA...</span></div>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a7a3c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10h18M3 10l3-6h12l3 6M3 10v8a1 1 0 001 1h1m15-9v8a1 1 0 01-1 1h-1M7 19h10M7 19a2 2 0 01-2-2v-1h14v1a2 2 0 01-2 2"/>
        <circle cx="7.5" cy="19.5" r="1" fill="#1a7a3c" stroke="none"/>
        <circle cx="16.5" cy="19.5" r="1" fill="#1a7a3c" stroke="none"/>
      </svg>
    </div>
    <div class="header-info"><h1>TITSA Asistente</h1><p>Horarios y líneas de Tenerife</p></div>
    <div class="status"><div class="status-dot"></div><span>En línea</span></div>
  </div>
  <div class="ctx-banner" id="ctx-banner" style="display:none">
    <span class="ctx-texto" id="ctx-texto"></span>
    <button class="ctx-reset" onclick="resetCtx()">Cambiar</button>
  </div>
  <div class="chat" id="chat"></div>
  <div class="chips" id="chips" style="display:none">
    <button class="chip" onclick="sendChip('horarios laborable')">Laborable</button>
    <button class="chip" onclick="sendChip('horarios sabado')">Sábado</button>
    <button class="chip" onclick="sendChip('horarios domingo')">Domingo</button>
    <button class="chip" onclick="sendChip('paradas')">Paradas</button>
  </div>
  <div class="input-area">
    <input class="chat-input" id="input" type="text" placeholder="Línea 103 · parada 2625 · ir al aeropuerto…" />
    <button class="send-btn" id="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>
<script>
const DATA_URL = 'data/titsa_completo.json';
let DB = null, ctx = null;

// Aliases: variantes de nombres -> IDs de paradas principales
const ALIASES = {
  'santa cruz': ['9181','9450'], 'santacruz': ['9181','9450'],
  'intercambiador santa cruz': ['9181','9450'], 'intercambiador de santa cruz': ['9181','9450'],
  'laguna': ['2625','2830'], 'la laguna': ['2625','2830'],
  'intercambiador laguna': ['2625','2830'], 'intercambiador de laguna': ['2625','2830'],
  'aeropuerto norte': ['4537'], 'aeropuerto tfn': ['4537'], 'los rodeos': ['4537'], 'tfn': ['4537'],
  'aeropuerto sur': ['7571','8326'], 'aeropuerto tfs': ['7571','8326'], 'reina sofia': ['7571'], 'tfs': ['7571','8326'],
  'aeropuerto': ['4537','7571','8326'],
  'puerto de la cruz': ['5090','9197'], 'puerto cruz': ['5090'], 'el puerto': ['5090'],
  'los cristianos': ['7140','8184'], 'cristianos': ['7140','8184'],
  'costa adeje': ['7142'], 'adeje': ['7142'], 'playa de las americas': ['7142'],
  'icod': ['4358'], 'icod de los vinos': ['4358'],
  'candelaria': ['1723'],
  'orotava': ['4009'], 'la orotava': ['4009'],
  'buenavista': ['9198'], 'masca': ['4553'],
  'teide': ['4692'], 'las canadas': ['4692'],
  'punta del hidalgo': ['1327'], 'hidalgo': ['1327'],
  'bajamar': ['1318'],
  'tacoronte': ['2100'],
  'sauzal': ['2140'], 'el sauzal': ['2140'],
  'los gigantes': ['4651'], 'gigantes': ['4651'],
  'granadilla': ['3504'], 'san isidro': ['3500'],
  'el medano': ['3519'], 'medano': ['3519'],
  'teresitas': ['910'], 'las teresitas': ['910'],
  'san andres': ['945'],
  'tegueste': ['1052'],
};

fetch(DATA_URL)
  .then(r => r.json())
  .then(data => {
    DB = data;
    document.getElementById('loading-overlay').style.display = 'none';
    addBot('¡Hola! Soy el asistente de TITSA 🚌<br>' +
      'Datos reales de <strong>' + Object.keys(DB.lineas).length + ' líneas</strong> y <strong>' + Object.keys(DB.paradas).length + ' paradas</strong>.<br><br>' +
      '• <strong>Línea:</strong> "103", "línea 50"<br>' +
      '• <strong>Parada:</strong> "2625", "parada 1234"<br>' +
      '• <strong>Ruta:</strong> "cómo ir de La Laguna al aeropuerto"');
  })
  .catch(() => { document.getElementById('loading-overlay').style.display = 'none'; addBot('Error cargando datos. Recarga la página.'); });

document.getElementById('input').addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

function now() { return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}); }
function addBot(html) {
  const chat = document.getElementById('chat');
  const el = document.createElement('div'); el.className = 'msg bot';
  el.innerHTML = `<div class="bubble">${html}</div><span class="msg-time">${now()}</span>`;
  chat.appendChild(el); chat.scrollTop = chat.scrollHeight;
}
function addUser(text) {
  const chat = document.getElementById('chat');
  const el = document.createElement('div'); el.className = 'msg user';
  el.innerHTML = `<div class="bubble">${text}</div><span class="msg-time">${now()}</span>`;
  chat.appendChild(el); chat.scrollTop = chat.scrollHeight;
}
function showTyping() {
  const chat = document.getElementById('chat');
  const el = document.createElement('div'); el.id = 'typing'; el.className = 'msg bot';
  el.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chat.appendChild(el); chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function setLoading(on) { document.getElementById('input').disabled = on; document.getElementById('send-btn').disabled = on; }
function setCtx(tipo, datos, num, label) {
  ctx = { tipo, datos, num };
  document.getElementById('ctx-texto').textContent = label;
  document.getElementById('ctx-banner').style.display = 'flex';
  document.getElementById('chips').style.display = tipo === 'linea' ? 'flex' : 'none';
}
function resetCtx() {
  ctx = null;
  document.getElementById('ctx-banner').style.display = 'none';
  document.getElementById('chips').style.display = 'none';
  addBot('¿Qué línea, parada o ruta consultas?');
}

function norm(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').trim();
}
function fmtHora(h) {
  if (!h) return '';
  const p = h.split(':');
  return `${String(parseInt(p[0])%24).padStart(2,'0')}:${p[1]||'00'}`;
}

// Detectar número de línea
function detectaLinea(t) {
  const txt = t.toLowerCase();
  if (/\b\d{4,}\b/.test(txt)) return null;
  let m = txt.match(/l[ií]nea\s+0*(\d{1,3})\b/); if (m) return m[1];
  m = txt.match(/^0*(\d{1,3})$/); if (m) return m[1];
  m = txt.match(/\b0*(\d{2,3})\b/); if (m && !txt.includes('parada')) return m[1];
  return null;
}

// Detectar número de parada
function detectaParada(t) {
  const txt = t.toLowerCase();
  let m = txt.match(/(?:parada|stop)\s+(\d{3,5})\b/); if (m) return m[1];
  m = txt.match(/\b(\d{4,5})\b/); if (m) return m[1];
  return null;
}

// Detectar si es consulta de ruta - muy amplio
function detectaRuta(t) {
  const n = norm(t);
  // Patrones de ruta
  if (/como\s+(ir|llegar|voy|puedo ir|puedo llegar|llego|me voy|me llego)/.test(n)) return true;
  if (/que\s+(guagua|linea|bus)\s*(tengo|coger|tomo|va|hay|debo|puedo|cojo)/.test(n)) return true;
  if (/(desde|de)\s+\w.+\s+(hasta|al?|a)\s+\w/.test(n)) return true;
  if (/(quiero|necesito|para)\s+(ir|llegar)\s+(al?|a|hasta)/.test(n)) return true;
  if (/me\s+(lleva|voy|vaya)\s+(al?|a|hasta)/.test(n)) return true;
  if (/(ir|llegar|viajar)\s+(al?|a|hasta|desde)/.test(n)) return true;
  if (/ruta\s+(de|desde|para)/.test(n)) return true;
  return false;
}

function detectaTipo(t) {
  const txt = t.toLowerCase();
  if (/s[aá]bado/.test(txt)) return 'S';
  if (/domingo|festivo/.test(txt)) return 'D';
  return 'L';
}

// Buscar paradas por alias o nombre
function buscarParadas(query) {
  const q = norm(query);
  // 1. Alias (más largo primero)
  const aliasKeys = Object.keys(ALIASES).sort((a,b) => b.length - a.length);
  for (const alias of aliasKeys) {
    if (q.includes(norm(alias))) {
      return ALIASES[alias].map(id => ({ id, ...DB.paradas[id] })).filter(p => p.nombre);
    }
  }
  // 2. Búsqueda por palabras en DB
  const words = q.split(/\s+/).filter(w => w.length > 2);
  if (!words.length) return [];
  const res = [];
  for (const [id, p] of Object.entries(DB.paradas)) {
    const nombre = norm(p.nombre);
    const score = words.filter(w => nombre.includes(w)).length;
    if (score > 0) res.push({ id, ...p, score });
  }
  return res.sort((a,b) => b.score - a.score).slice(0, 8);
}

// Extraer origen y destino de una frase
function extraerOD(text) {
  const t = text;
  let m;
  // "de X a Y" / "desde X hasta Y" / "desde X a Y"
  m = t.match(/(?:desde|de)\s+(.+?)\s+(?:hasta|al?|hacia|a)\s+(.+?)(?:\?|$)/i);
  if (m) return { origen: m[1].trim(), destino: m[2].trim() };
  // "como ir al X desde Y"
  m = t.match(/(?:c[oó]mo|como)\s+\w+\s+(?:al?|a|hasta)\s+(.+?)\s+(?:desde|de)\s+(.+?)(?:\?|$)/i);
  if (m) return { origen: m[2].trim(), destino: m[1].trim() };
  // "como ir al X" (sin origen)
  m = t.match(/(?:c[oó]mo|como)\s+\w+\s+(?:al?|a|hasta)\s+(.+?)(?:\?|$)/i);
  if (m) return { origen: '', destino: m[1].trim() };
  // "quiero ir a X desde Y" / "necesito ir a X"
  m = t.match(/(?:quiero|necesito|para)\s+(?:ir|llegar)\s+(?:al?|a|hasta)\s+(.+?)\s+(?:desde|de)\s+(.+?)(?:\?|$)/i);
  if (m) return { origen: m[2].trim(), destino: m[1].trim() };
  m = t.match(/(?:quiero|necesito|para)\s+(?:ir|llegar)\s+(?:al?|a|hasta)\s+(.+?)(?:\?|$)/i);
  if (m) return { origen: '', destino: m[1].trim() };
  // "me voy al X desde Y"
  m = t.match(/(?:me\s+voy|voy)\s+(?:al?|a|hasta)\s+(.+?)\s+(?:desde|de)\s+(.+?)(?:\?|$)/i);
  if (m) return { origen: m[2].trim(), destino: m[1].trim() };
  // "llego a X desde Y"
  m = t.match(/llego\s+(?:al?|a)\s+(.+?)\s+(?:desde|de)\s+(.+?)(?:\?|$)/i);
  if (m) return { origen: m[2].trim(), destino: m[1].trim() };
  // "estoy en X como voy al Y"
  m = t.match(/(?:estoy en|salgo de|vengo de)\s+(.+?)\s+(?:c[oó]mo|como)\s+\w+\s+(?:al?|a|hasta)\s+(.+?)(?:\?|$)/i);
  if (m) return { origen: m[1].trim(), destino: m[2].trim() };
  return { origen: '', destino: '' };
}

// BFS para encontrar ruta con transbordos
function buscarRuta(origen, destino) {
  const paradasOri = buscarParadas(origen);
  const paradasDst = buscarParadas(destino);

  if (!paradasOri.length || !paradasDst.length) {
    return { error: true, paradasOri, paradasDst };
  }

  const oriNombre = paradasOri[0].nombre;
  const dstNombre = paradasDst[0].nombre;
  const lineasOri = new Set(paradasOri.flatMap(p => p.lineas||[]));
  const lineasDst = new Set(paradasDst.flatMap(p => p.lineas||[]));

  // Líneas directas
  const directas = [...lineasOri].filter(l => lineasDst.has(l))
    .map(num => ({ num, ...DB.lineas[num] })).filter(l => l.nombre);
  if (directas.length) return { tipo:'directa', oriNombre, dstNombre, lineas: directas };

  // BFS con hasta 2 transbordos
  // Nodo: { lineasActuales, camino: [{linea, paradaTransbordo}] }
  const resultados = [];
  const visto = new Set();

  // Para cada linea de origen, BFS buscando lineas de destino
  for (const n1 of lineasOri) {
    const l1 = DB.lineas[n1]; if (!l1) continue;
    const paradasL1 = new Set(l1.paradas.map(p => p.id));

    // 1 transbordo
    for (const n2 of lineasDst) {
      if (n1 === n2) continue;
      const key = `${n1}|${n2}`; if (visto.has(key)) continue; visto.add(key);
      const l2 = DB.lineas[n2]; if (!l2) continue;
      const comun = l2.paradas.find(p => paradasL1.has(p.id));
      if (comun) {
        resultados.push({
          pasos: [
            { num: n1, nombre: l1.nombre, horarios: l1.horarios },
            { num: n2, nombre: l2.nombre, horarios: l2.horarios }
          ],
          transbordos: [{ id: comun.id, nombre: comun.nombre }]
        });
        if (resultados.length >= 3) break;
      }
    }
    if (resultados.length >= 3) break;

    // 2 transbordos si no hay con 1
    if (resultados.length === 0) {
      for (const [nMid, lMid] of Object.entries(DB.lineas)) {
        if (nMid === n1 || !lMid) continue;
        const paradasMid = new Set(lMid.paradas.map(p => p.id));
        const comunOM = lMid.paradas.find(p => paradasL1.has(p.id));
        if (!comunOM) continue;
        for (const n2 of lineasDst) {
          if (n2 === n1 || n2 === nMid) continue;
          const l2 = DB.lineas[n2]; if (!l2) continue;
          const comunMD = l2.paradas.find(p => paradasMid.has(p.id));
          if (comunMD) {
            resultados.push({
              pasos: [
                { num: n1, nombre: l1.nombre, horarios: l1.horarios },
                { num: nMid, nombre: lMid.nombre, horarios: lMid.horarios },
                { num: n2, nombre: l2.nombre, horarios: l2.horarios }
              ],
              transbordos: [
                { id: comunOM.id, nombre: comunOM.nombre },
                { id: comunMD.id, nombre: comunMD.nombre }
              ]
            });
            if (resultados.length >= 3) break;
          }
        }
        if (resultados.length >= 3) break;
      }
    }
  }

  if (resultados.length) return { tipo:'transbordo', oriNombre, dstNombre, resultados };
  return { tipo:'sinruta', oriNombre, dstNombre };
}

// Formateadores
function fmtLineaResumen(linea, num) {
  return `<strong>Línea ${num} — ${linea.nombre}</strong><br><br>¿Qué quieres saber?`;
}

function fmtHorarios(linea, num, tipo) {
  const h = linea.horarios[tipo];
  const tipoNombre = tipo==='S'?'Sábado':tipo==='D'?'Domingo/Festivo':'Laborable';
  if (!h || !Object.keys(h).length) return `No hay horarios de ${tipoNombre} para la línea ${num}.`;
  const cols = Object.entries(h);
  const maxFilas = Math.max(...cols.map(([,horas]) => horas.length));
  let html = `<strong>Línea ${num} — ${tipoNombre}</strong><table><tr>`;
  cols.forEach(([dest]) => { html += `<th>${dest.split('(')[0].trim()}</th>`; });
  html += '</tr>';
  for (let i = 0; i < maxFilas; i++) {
    html += '<tr>';
    cols.forEach(([,horas]) => { html += `<td>${horas[i] ? fmtHora(horas[i]) : ''}</td>`; });
    html += '</tr>';
  }
  html += '</table>';
  return html;
}

function fmtParadas(linea, num) {
  let html = `<strong>Línea ${num} — ${linea.paradas.length} paradas</strong><br><br>`;
  linea.paradas.forEach(p => { html += `<span class="parada-id">${p.id}</span> ${p.nombre}<br>`; });
  return html;
}

function fmtParadaInfo(id) {
  const p = DB.paradas[id];
  if (!p) return `No encontré la parada <strong>${id}</strong>.`;
  let html = `<strong>Parada ${id} — ${p.nombre}</strong><br><br><strong>${p.lineas.length} líneas:</strong><br>`;
  p.lineas.forEach(num => {
    const l = DB.lineas[num];
    html += `<div style="margin:3px 0"><span class="linea-badge">${num}</span> ${l?l.nombre:num}</div>`;
  });
  return html;
}

function fmtRuta(r) {
  if (r.error) {
    let html = 'No encontré paradas para esa ruta.<br><br>';
    if (!r.paradasOri.length) html += 'No reconozco el origen.<br>';
    if (!r.paradasDst.length) html += 'No reconozco el destino.<br>';
    html += '<br><small>Prueba con: "santa cruz", "laguna", "aeropuerto", "puerto cruz", "los cristianos", "adeje", "icod"…</small>';
    return html;
  }
  if (r.tipo === 'directa') {
    let html = `<strong>${r.oriNombre} → ${r.dstNombre}</strong><br><br>`;
    html += `<strong>✅ ${r.lineas.length} línea${r.lineas.length>1?'s':''} directa${r.lineas.length>1?'s':''}:</strong><br>`;
    r.lineas.slice(0,5).forEach(l => {
      const hL = l.horarios?.L; const pd = hL?Object.values(hL)[0]:null;
      html += `<div class="ruta-bloque"><span class="linea-badge">${l.num}</span> <strong>${l.nombre}</strong>`;
      if (pd && pd.length) html += `<br><small style="color:var(--texto-suave)">Lab: ${fmtHora(pd[0])} – ${fmtHora(pd[pd.length-1])} · ${pd.length} salidas</small>`;
      html += '</div>';
    });
    return html;
  }
  if (r.tipo === 'transbordo') {
    let html = `<strong>${r.oriNombre} → ${r.dstNombre}</strong><br><br>`;
    html += '<strong>🔄 Sin línea directa — opciones con transbordo:</strong><br>';
    r.resultados.forEach((res, i) => {
      html += `<div class="ruta-bloque"><strong>Opción ${i+1}:</strong><br>`;
      res.pasos.forEach((paso, pi) => {
        const hL = paso.horarios?.L; const pd = hL?Object.values(hL)[0]:null;
        html += `<span class="linea-badge">${paso.num}</span> <strong>${paso.nombre}</strong>`;
        if (pd && pd.length) html += `<br><small style="color:var(--texto-suave)">Lab: ${fmtHora(pd[0])} – ${fmtHora(pd[pd.length-1])}</small>`;
        if (pi < res.transbordos.length) {
          const tb = res.transbordos[pi];
          html += `<br><span class="transbordo-tag">TRANSBORDO</span> en <span class="parada-id">${tb.id}</span> ${tb.nombre}<br>`;
        }
      });
      html += '</div>';
    });
    return html;
  }
  return `<strong>${r.oriNombre} → ${r.dstNombre}</strong><br><br>No se encontró ruta.<br><small>Consulta <a href="https://www.titsa.com" target="_blank">titsa.com</a>.</small>`;
}

// Motor principal
async function handleSend() {
  const inp = document.getElementById('input');
  const text = inp.value.trim(); if (!text) return;
  inp.value = ''; await process(text);
}
async function sendChip(text) { await process(text); }

async function process(text) {
  if (!DB) { addBot('Los datos aún se están cargando, espera.'); return; }
  addUser(text); setLoading(true); showTyping();
  await new Promise(r => setTimeout(r,150));
  const txt = text.toLowerCase();

  // Paradas en contexto línea
  if (/paradas?|recorrido/.test(txt) && ctx?.tipo==='linea') {
    hideTyping(); addBot(fmtParadas(ctx.datos,ctx.num)); setLoading(false); return;
  }

  // Número de línea
  const numLinea = detectaLinea(text);
  if (numLinea) {
    const linea = DB.lineas[numLinea]; hideTyping();
    if (!linea) { addBot(`No encontré la línea <strong>${numLinea}</strong>.`); }
    else {
      setCtx('linea', linea, numLinea, `Línea ${numLinea} — ${linea.nombre}`);
      if (/paradas?|recorrido/.test(txt)) addBot(fmtParadas(linea,numLinea));
      else if (/horario|salida|hora/.test(txt)) addBot(fmtHorarios(linea,numLinea,detectaTipo(text)));
      else addBot(fmtLineaResumen(linea,numLinea));
    }
    setLoading(false); return;
  }

  // Número de parada
  const numParada = detectaParada(text);
  if (numParada) {
    hideTyping();
    if (!DB.paradas[numParada]) { addBot(`No encontré la parada <strong>${numParada}</strong>.`); }
    else { setCtx('parada',DB.paradas[numParada],numParada,`Parada ${numParada} — ${DB.paradas[numParada].nombre}`); addBot(fmtParadaInfo(numParada)); }
    setLoading(false); return;
  }

  // Ruta
  if (detectaRuta(text)) {
    const { origen, destino } = extraerOD(text);
    hideTyping();
    if (!destino && !origen) {
      addBot('Dime origen y destino.<br>Ej: <strong>"cómo ir de La Laguna al aeropuerto"</strong>');
    } else if (!origen) {
      addBot(`¿Desde dónde quieres ir a <strong>${destino}</strong>?`);
    } else if (!destino) {
      addBot(`¿A dónde quieres ir desde <strong>${origen}</strong>?`);
    } else {
      addBot(fmtRuta(buscarRuta(origen, destino)));
    }
    setLoading(false); return;
  }

  // Con contexto activo
  if (ctx?.tipo==='linea') {
    hideTyping(); addBot(fmtHorarios(ctx.datos,ctx.num,detectaTipo(text))); setLoading(false); return;
  }
  if (ctx?.tipo==='parada') {
    hideTyping(); addBot(fmtParadaInfo(ctx.num)); setLoading(false); return;
  }

  // Búsqueda de parada por nombre (ej: "qué guaguas pasan por avenida anaga")
  if (/gu[aá]guas?\s+(pasan|paran|hay|van)\s+(?:por|en)|paradas?\s+(?:de|en|cerca)/i.test(txt)) {
    const paradasEncontradas = buscarParadas(text);
    hideTyping();
    if (paradasEncontradas.length) {
      setCtx('parada', paradasEncontradas[0], paradasEncontradas[0].id, `Parada ${paradasEncontradas[0].id} — ${paradasEncontradas[0].nombre}`);
      addBot(fmtParadaInfo(paradasEncontradas[0].id));
    } else {
      addBot('No encontré esa parada. Prueba con el número de parada directamente.');
    }
    setLoading(false); return;
  }

  hideTyping();
  addBot('No entendí la consulta.<br>• <strong>Línea:</strong> "103" o "línea 50"<br>• <strong>Parada:</strong> "2625"<br>• <strong>Ruta:</strong> "cómo ir de La Laguna al aeropuerto"<br>• <strong>También:</strong> "estoy en Las Teresitas cómo voy a Santa Cruz"');
  setLoading(false);
}
</script>
