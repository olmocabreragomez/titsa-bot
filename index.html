<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TITSA Asistente</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --verde: #1a7a3c; --amarillo: #f5c800; --amarillo-texto: #1a4a22; --fondo: #f4f4f0; --blanco: #ffffff; --texto: #1a1a1a; --texto-suave: #666; --borde: rgba(0,0,0,0.1); }
    body { background: var(--fondo); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .app { width: 100%; max-width: 440px; display: flex; flex-direction: column; height: 100vh; max-height: 780px; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
    .header { background: var(--verde); padding: 14px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-icon { width: 38px; height: 38px; background: var(--amarillo); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-icon svg { width: 22px; height: 22px; }
    .header-info h1 { font-size: 15px; font-weight: 600; color: #fff; }
    .header-info p { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 1px; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.7); }
    .status-dot { width: 7px; height: 7px; background: #5dde8a; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(93,222,138,0.4); } 50% { box-shadow: 0 0 0 4px rgba(93,222,138,0); } }
    #config-panel { display: flex; align-items: center; gap: 6px; padding: 8px 12px; flex-shrink: 0; background: #fff8e1; border-bottom: 1px solid #f5c800; }
    #config-panel label { font-size: 11px; color: #795900; white-space: nowrap; }
    #apikey-field { flex:1; font-size: 11px; font-family:'DM Mono',monospace; padding: 4px 8px; border:1px solid #f5c800; border-radius:6px; min-width: 0; }
    #save-key-btn { background:var(--verde); color:#fff; border:none; border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer; white-space:nowrap; }
    .linea-banner { background: var(--amarillo); padding: 9px 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .linea-nombre { font-size: 12px; font-weight: 500; color: var(--amarillo-texto); }
    .chat { flex: 1; overflow-y: auto; background: var(--fondo); padding: 16px 12px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 92%; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .bot .bubble { background: var(--blanco); border: 1px solid var(--borde); color: var(--texto); border-radius: 4px 16px 16px 16px; padding: 10px 14px; font-size: 13.5px; line-height: 1.6; }
    .user .bubble { background: var(--verde); color: #fff; border-radius: 16px 4px 16px 16px; padding: 10px 14px; font-size: 13.5px; line-height: 1.55; }
    .msg-time { font-size: 10px; color: var(--texto-suave); padding: 0 4px; }
    .bot .bubble table { width: 100%; border-collapse: collapse; margin: 4px 0 0 0; font-size: 12px; }
    .bot .bubble th { background: var(--verde); color: #fff; padding: 5px 8px; text-align: center; font-weight: 500; }
    .bot .bubble td { padding: 4px 8px; text-align: center; border-bottom: 1px solid var(--borde); }
    .bot .bubble tr:nth-child(even) td { background: #f9f9f9; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px 4px; background: var(--fondo); flex-shrink: 0; }
    .chip { font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--borde); background: var(--blanco); color: var(--texto); cursor: pointer; transition: all 0.15s; }
    .chip:hover { background: var(--verde); color: #fff; border-color: var(--verde); }
    .input-area { background: var(--blanco); padding: 10px 12px; display: flex; gap: 8px; align-items: center; border-top: 1px solid var(--borde); flex-shrink: 0; }
    .chat-input { flex: 1; border: 1px solid var(--borde); border-radius: 22px; padding: 9px 16px; font-size: 13.5px; font-family: 'DM Sans', sans-serif; background: var(--fondo); color: var(--texto); outline: none; transition: border-color 0.15s; }
    .chat-input:focus { border-color: var(--verde); }
    .chat-input:disabled { opacity: 0.5; }
    .send-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--verde); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity 0.15s; }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }
    .send-btn svg { width: 15px; height: 15px; }
    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 14px; background: var(--blanco); border: 1px solid var(--borde); border-radius: 4px 16px 16px 16px; width: fit-content; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a7a3c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10h18M3 10l3-6h12l3 6M3 10v8a1 1 0 001 1h1m15-9v8a1 1 0 01-1 1h-1M7 19h10M7 19a2 2 0 01-2-2v-1h14v1a2 2 0 01-2 2"/>
        <circle cx="7.5" cy="19.5" r="1" fill="#1a7a3c" stroke="none"/>
        <circle cx="16.5" cy="19.5" r="1" fill="#1a7a3c" stroke="none"/>
      </svg>
    </div>
    <div class="header-info">
      <h1>TITSA Asistente</h1>
      <p>Informacion de lineas y horarios</p>
    </div>
    <div class="status"><div class="status-dot"></div><span>En linea</span></div>
  </div>

  <div id="config-panel">
    <label>API Key:</label>
    <input id="apikey-field" type="password" placeholder="sk-..." />
    <button id="save-key-btn" onclick="saveKey()">Guardar</button>
  </div>

  <div class="linea-banner" id="linea-banner" style="display:none">
    <span class="linea-nombre" id="linea-nombre"></span>
  </div>

  <div class="chat" id="chat"></div>

  <div class="chips" id="chips" style="display:none">
    <button class="chip" onclick="sendChip('Horarios de laborables')">Horarios laborables</button>
    <button class="chip" onclick="sendChip('Horarios de fin de semana')">Fin de semana</button>
    <button class="chip" onclick="sendChip('Recorrido y paradas')">Recorrido</button>
    <button class="chip" onclick="cambiarLinea()">Cambiar linea</button>
  </div>

  <div class="input-area">
    <input class="chat-input" id="input" type="text" placeholder="Ej: linea 103, horarios 014..." />
    <button class="send-btn" id="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>

<script>
var PROXY = 'https://titsa-proxy-p1z7.vercel.app';
var OPENAI_KEY = localStorage.getItem('titsa_openai_key') || '';
var lineaActual = null;
var lineaCache = {};
var historial = [];

if (OPENAI_KEY) document.getElementById('config-panel').style.display = 'none';
document.getElementById('input').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleSend(); });

addBotMsg('Hola! Soy el asistente de TITSA.<br>Dime el numero de linea que quieres consultar.');

function saveKey() {
  var val = document.getElementById('apikey-field').value.trim();
  if (!val.startsWith('sk-')) { alert('La key debe empezar por sk-'); return; }
  OPENAI_KEY = val;
  localStorage.setItem('titsa_openai_key', val);
  document.getElementById('config-panel').style.display = 'none';
}

function now() {
  return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

function addBotMsg(html) {
  var chat = document.getElementById('chat');
  var el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = '<div class="bubble">' + html + '</div><span class="msg-time">' + now() + '</span>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function addUserMsg(text) {
  var chat = document.getElementById('chat');
  var el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = '<div class="bubble">' + text + '</div><span class="msg-time">' + now() + '</span>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  var chat = document.getElementById('chat');
  var el = document.createElement('div');
  el.id = 'typing';
  el.className = 'msg bot';
  el.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById('typing');
  if (t) t.remove();
}

function setLoading(on) {
  document.getElementById('input').disabled = on;
  document.getElementById('send-btn').disabled = on;
}

function setLinea(datos) {
  lineaActual = datos;
  document.getElementById('linea-nombre').textContent = 'Linea ' + datos.linea + ' - ' + datos.nombre;
  document.getElementById('linea-banner').style.display = 'flex';
  document.getElementById('chips').style.display = 'flex';
}

function cambiarLinea() {
  lineaActual = null;
  historial = [];
  document.getElementById('linea-banner').style.display = 'none';
  document.getElementById('chips').style.display = 'none';
  addBotMsg('De acuerdo, que linea quieres consultar?');
}

async function consultarLinea(num) {
  var key = num.toString();
  if (lineaCache[key]) return lineaCache[key];
  try {
    var res = await fetch(PROXY + '/api/titsa?linea=' + key);
    var data = await res.json();
    if (!data.error) lineaCache[key] = data;
    return data;
  } catch(e) {
    return { error: 'Sin conexion' };
  }
}

function extraerNumeroLinea(texto) {
  var m = texto.match(/l[ií]nea\s+(\d{1,3})/i);
  if (m) return m[1];
  m = texto.match(/^(\d{1,3})$/);
  if (m) return m[1];
  m = texto.match(/\b(\d{2,3})\b/);
  if (m) return m[1];
  return null;
}

async function handleSend() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  await processMessage(text);
}

async function sendChip(text) { await processMessage(text); }

async function processMessage(text) {
  if (!OPENAI_KEY) {
    addBotMsg('Introduce tu API Key arriba y pulsa Guardar.');
    return;
  }

  addUserMsg(text);
  setLoading(true);
  showTyping();

  var datosLinea = lineaActual;
  var numDetectado = extraerNumeroLinea(text);

  if (numDetectado) {
    var datos = await consultarLinea(numDetectado);
    if (!datos.error) {
      var esNuevaLinea = !lineaActual || lineaActual.linea !== datos.linea;
      datosLinea = datos;
      setLinea(datos);
      if (esNuevaLinea) historial = [];
    } else {
      removeTyping();
      addBotMsg('No he encontrado la linea ' + numDetectado + ' en TITSA.');
      setLoading(false);
      return;
    }
  }

  historial.push({ role: 'user', content: text });

  try {
    var respuesta = await llamarOpenAI(datosLinea);
    respuesta = limpiarMarkdown(respuesta);
    removeTyping();
    addBotMsg(respuesta);
    historial.push({ role: 'assistant', content: respuesta });
  } catch(e) {
    removeTyping();
    addBotMsg('Error: ' + e.message);
  } finally {
    setLoading(false);
  }
}

function limpiarMarkdown(texto) {
  return texto
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/#{1,6}\s*/g, '')
    .replace(/\n/g, '<br>');
}

async function llamarOpenAI(datosLinea) {
  var contexto;
  var esPrimeraVez = historial.length <= 1;

  if (datosLinea && !datosLinea.error) {
    contexto = 'DATOS REALES DE TITSA.COM PARA LA LINEA ' + datosLinea.linea + ' (' + datosLinea.nombre + '):\n' + datosLinea.contenido;
  } else {
    contexto = 'El usuario no ha indicado linea. Pidele el numero de linea.';
  }

  var instrucciones;
  if (esPrimeraVez) {
    instrucciones = 'El usuario acaba de mencionar esta linea por primera vez. Presentala brevemente: nombre, origen y destino en 2-3 lineas cortas. NO des horarios todavia. Termina preguntando que necesita saber.';
  } else {
    instrucciones = 'Responde a la pregunta del usuario usando UNICAMENTE los datos proporcionados.\n'
      + 'Si pregunta por horarios: presentalos en una tabla HTML con <table><thead><tr><th>Desde La Laguna</th><th>Desde Puerto de la Cruz</th></tr></thead><tbody>...</tbody></table>. Pon cada hora en su celda correspondiente.\n'
      + 'Si pregunta como llegar de un sitio a otro: busca en los datos del recorrido de la linea si conecta esos puntos. Si la linea actual los conecta, indicalo claramente con los horarios relevantes. No inventes otras lineas.\n'
      + 'Si pregunta por el recorrido: lista las paradas principales separadas por flechas (->).\n'
      + 'Nunca digas que no tienes informacion si los datos estan en el contexto. Lee bien el contenido antes de responder.';
  }

  var sistema = 'Eres el asistente virtual de TITSA (Transportes Interurbanos de Tenerife).\n'
    + 'Responde en espanol, de forma amable y concisa.\n'
    + 'FORMATO OBLIGATORIO: Usa solo HTML: <strong> para negrita, <br> para saltos de linea, tablas HTML para horarios.\n'
    + 'PROHIBIDO TOTALMENTE: asteriscos (*), almohadillas (#), guiones bajos (_), corchetes, cualquier markdown.\n'
    + 'NUNCA inventes datos ni lineas que no esten en los datos proporcionados.\n\n'
    + instrucciones + '\n\n'
    + contexto;

  var res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + OPENAI_KEY },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      max_tokens: 700,
      messages: [{ role: 'system', content: sistema }].concat(historial)
    })
  });

  if (!res.ok) {
    var e = await res.json();
    throw new Error(e.error ? e.error.message : res.statusText);
  }
  var data = await res.json();
  return data.choices[0].message.content;
}
</script>
</body>
</html>
