<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TITSA Bot</title>
<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.app {
  background:white;
  width:400px;
  padding:20px;
  border-radius:10px;
}
.chat {
  height:300px;
  overflow-y:auto;
  margin-bottom:10px;
}
.msg { margin-bottom:10px; }
.user { text-align:right; }
.bot { text-align:left; }
input {
  width:75%;
  padding:10px;
}
button {
  padding:10px;
}
</style>
</head>
<body>

<div class="app">
  <div class="chat" id="chat"></div>
  <input id="input" placeholder="Ej: línea 103">
  <button onclick="send()">Enviar</button>
</div>

<script>

const PROXY = "https://titsa-proxy-f1oci50yf-olmocabreragomez-4505s-projects.vercel.app";

function addMsg(text, type){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value;
  input.value = "";

  addMsg(text, "user");

  const match = text.match(/\d+/);

  if(!match){
    addMsg("❌ Escribe un número de línea (ej: 103)", "bot");
    return;
  }

  const linea = match[0];

  addMsg("Buscando...", "bot");

  try{
    const res = await fetch(`${PROXY}/api/titsa?linea=${linea}`);
    const data = await res.json();

    if(data.error){
      addMsg("❌ Línea no encontrada", "bot");
      return;
    }

    addMsg(`
      <b>Línea ${data.linea} - ${data.nombre}</b><br><br>
      <b>Recorrido:</b> ${data.recorrido}<br>
      <b>Duración:</b> ${data.duracion}<br><br>
      <b>Horarios:</b><br>
      ${data.horarios.join("<br>")}
    `, "bot");

  }catch(e){
    addMsg("❌ Error al conectar", "bot");
  }
}

</script>

</body>
</html>
